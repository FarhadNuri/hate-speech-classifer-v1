<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bengali Hate Speech Classifier</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 700px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }
        
        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            min-height: 120px;
            transition: border-color 0.3s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            display: none;
        }
        
        .result.show {
            display: block;
            animation: fadeIn 0.5s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .prediction {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .scores {
            margin-top: 15px;
        }
        
        .score-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin-bottom: 8px;
            background: white;
            border-radius: 8px;
        }
        
        .score-label {
            font-weight: 600;
            color: #555;
        }
        
        .score-bar {
            flex: 1;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin: 0 15px;
            overflow: hidden;
        }
        
        .score-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        
        .score-value {
            font-weight: 600;
            color: #667eea;
            min-width: 60px;
            text-align: right;
        }
        
        .error {
            color: #e74c3c;
            padding: 15px;
            background: #fee;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }
        
        .error.show {
            display: block;
        }
        
        .loading {
            text-align: center;
            color: #667eea;
            margin-top: 15px;
            display: none;
        }
        
        .loading.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ Bengali Hate Speech Classifier</h1>
        <p class="subtitle">Enter Bengali text to classify hate speech</p>
        
        <div class="input-group">
            <label for="textInput">Enter Text:</label>
            <textarea id="textInput" placeholder="এখানে বাংলা টেক্সট লিখুন..."></textarea>
        </div>
        
        <button id="predictBtn" onclick="predict()">Analyze Text</button>
        
        <div class="loading" id="loading">
            <p>⏳ Analyzing...</p>
        </div>
        
        <div class="error" id="error"></div>
        
        <div class="result" id="result">
            <div class="prediction" id="prediction"></div>
            <div class="scores" id="scores"></div>
        </div>
    </div>
    
    <script>
        async function predict() {
            const text = document.getElementById('textInput').value.trim();
            const resultDiv = document.getElementById('result');
            const errorDiv = document.getElementById('error');
            const loadingDiv = document.getElementById('loading');
            const predictBtn = document.getElementById('predictBtn');
            
            // Reset
            resultDiv.classList.remove('show');
            errorDiv.classList.remove('show');
            
            if (!text) {
                errorDiv.textContent = 'Please enter some text';
                errorDiv.classList.add('show');
                return;
            }
            
            // Show loading
            loadingDiv.classList.add('show');
            predictBtn.disabled = true;
            
            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ text: text })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    displayResult(data);
                } else {
                    throw new Error(data.error || 'Prediction failed');
                }
            } catch (error) {
                errorDiv.textContent = 'Error: ' + error.message;
                errorDiv.classList.add('show');
            } finally {
                loadingDiv.classList.remove('show');
                predictBtn.disabled = false;
            }
        }
        
        function displayResult(data) {
            const predictionDiv = document.getElementById('prediction');
            const scoresDiv = document.getElementById('scores');
            const resultDiv = document.getElementById('result');
            
            predictionDiv.innerHTML = `<strong>Predicted Class:</strong> ${data.prediction}`;
            
            scoresDiv.innerHTML = '<h3 style="margin-bottom: 10px; color: #555;">Confidence Scores:</h3>';
            
            data.all_scores.forEach(item => {
                const percentage = (item.score * 100).toFixed(2);
                scoresDiv.innerHTML += `
                    <div class="score-item">
                        <span class="score-label">Class ${item.label}</span>
                        <div class="score-bar">
                            <div class="score-fill" style="width: ${percentage}%"></div>
                        </div>
                        <span class="score-value">${percentage}%</span>
                    </div>
                `;
            });
            
            resultDiv.classList.add('show');
        }
        
        // Allow Enter key to submit
        document.getElementById('textInput').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                predict();
            }
        });
    </script>
</body>
</html>
